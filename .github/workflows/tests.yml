name: Run Tests

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock pyyaml httpx

      - name: Check Alembic heads
        run: |
          HEAD_COUNT=$(alembic heads | grep -c "(head)")
          if [ "$HEAD_COUNT" -gt 1 ]; then
            echo "Warning: Multiple Alembic heads detected."
            echo "This is acceptable as long as deployments use Alembic correctly (upgrade to all heads)."
            alembic heads
          fi
          if [ "$HEAD_COUNT" -eq 0 ]; then
             echo "Warning: No Alembic heads detected. Check if migrations exist."
          fi

      - name: Smoke Test (Verify Imports)
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          TESTING: "true"
          ANTHROPIC_API_KEY: "sk-ant-mock-key"
        run: |
          # Verify the application can at least be imported without crashing
          python -c "from app.main import app; print('App imported successfully')"

      - name: Run Pytest
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          TESTING: "true"
          ANTHROPIC_API_KEY: "sk-ant-mock-key"
        run: |
          # Pytest will automatically respect tests_config.yaml in the root
          pytest --verbose -m "not ai_test"

  admin-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/admin-tma/package-lock.json

      - name: Install admin dependencies
        working-directory: apps/admin-tma
        run: npm ci

      - name: Unit/component tests (Vitest)
        working-directory: apps/admin-tma
        run: npm test

      - name: Install Playwright browsers
        working-directory: apps/admin-tma
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        working-directory: apps/admin-tma
        run: npm run test:e2e:mock

  admin-e2e-integration:
    runs-on: ubuntu-latest
    needs: admin-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/admin-tma/package-lock.json

      - name: Install admin dependencies
        working-directory: apps/admin-tma
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/admin-tma
        run: npx playwright install --with-deps chromium

      - name: Prepare environment
        run: cp .env.example .env

      - name: Start integration stack
        run: |
          docker compose up -d postgres redis rabbitmq nats clickhouse analytics-aggregator
          DATABASE_URL='postgresql+asyncpg://gifty:gifty@postgres:5432/gifty' docker compose up -d api
          docker compose exec -T api alembic upgrade head

      - name: Wait for health endpoints
        run: |
          for i in {1..40}; do
            if curl -sf http://127.0.0.1:8000/docs >/dev/null && \
               curl -sf -H "x-internal-token: your_internal_api_token" http://127.0.0.1:8000/api/v1/internal/ops/runtime-settings >/dev/null && \
               curl -sf http://127.0.0.1:8095/health >/dev/null; then
              echo "Services are healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Services did not become healthy in time"
          docker compose ps
          docker compose logs --tail 100 api analytics-aggregator
          exit 1

      - name: E2E integration smoke (Playwright)
        working-directory: apps/admin-tma
        env:
          E2E_APP_BASE_URL: http://127.0.0.1:3001
          E2E_API_BASE_URL: http://127.0.0.1:8000
          E2E_LIVE_ANALYTICS_BASE_URL: http://127.0.0.1:8095
          E2E_DOCKER_NETWORK: gifty-backend_default
          E2E_PUBLISH_NATS_EVENT: "1"
          E2E_INTERNAL_API_TOKEN: your_internal_api_token
          E2E_LIVE_ANALYTICS_WS_TOKEN: dev-live-analytics-token
        run: npm run test:e2e:integration

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail 150 api analytics-aggregator nats clickhouse

      - name: Stop integration stack
        if: always()
        run: docker compose down -v
