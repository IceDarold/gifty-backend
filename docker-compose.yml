services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nats:
        condition: service_started
      clickhouse:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LLM_PROXY_URL: "socks5://host.docker.internal:3128"
      # Tracing (Tempo via OpenTelemetry Collector)
      OTEL_TRACING_ENABLED: "${OTEL_TRACING_ENABLED:-true}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-gifty-api}"
      NATS_URL: "${NATS_URL:-nats://nats:4222}"

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: [ "-js", "-m", "8222" ]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-analytics}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-analytics}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./deploy/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --query 'SELECT 1'" ]
      interval: 10s
      timeout: 5s
      retries: 15

  analytics-aggregator:
    build:
      context: ./services/analytics-aggregator
    restart: unless-stopped
    command: ["analytics-realtime"]
    env_file: .env
    environment:
      LISTEN_ADDR: ":8095"
      NATS_URL: "${NATS_URL:-nats://nats:4222}"
      NATS_STREAM: "AN_EVENTS"
      NATS_SUBJECT: "analytics.events.v1.>"
      NATS_DURABLE: "AGG_WRITER_V1"
      NATS_STATE_STREAM: "${NATS_STATE_STREAM:-STATE_EVENTS}"
      NATS_STATE_SUBJECT: "${NATS_STATE_SUBJECT:-state.events.v1.>}"
      NATS_STATE_DURABLE: "${NATS_STATE_DURABLE:-STATE_WRITER_V1}"
      CLICKHOUSE_DSN: "${CLICKHOUSE_DSN:-clickhouse://analytics:analytics@clickhouse:9000/default}"
      ANALYTICS_SCHEMA_PATH: "/app/contracts/analytics/event-envelope.v1.json"
      ANALYTICS_FLUSH_SECONDS: "${ANALYTICS_FLUSH_SECONDS:-60}"
      ANALYTICS_DEDUP_TTL_SECONDS: "${ANALYTICS_DEDUP_TTL_SECONDS:-900}"
      ANALYTICS_REHYDRATE_MINUTES: "${ANALYTICS_REHYDRATE_MINUTES:-180}"
      LIVE_ANALYTICS_WS_TOKEN: "${LIVE_ANALYTICS_WS_TOKEN:-dev-live-analytics-token}"
      INTERNAL_API_TOKEN: "${INTERNAL_API_TOKEN:-}"
      ADMIN_WS_API_BASE: "${ADMIN_WS_API_BASE:-http://api:8000}"
      ADMIN_WS_POLL_DASHBOARD_SECONDS: "${ADMIN_WS_POLL_DASHBOARD_SECONDS:-30}"
      ADMIN_WS_POLL_OPS_SECONDS: "${ADMIN_WS_POLL_OPS_SECONDS:-30}"
      ADMIN_WS_POLL_CATALOG_SECONDS: "${ADMIN_WS_POLL_CATALOG_SECONDS:-60}"
      ADMIN_WS_POLL_SETTINGS_SECONDS: "${ADMIN_WS_POLL_SETTINGS_SECONDS:-60}"
      ADMIN_WS_POLL_LOGS_SECONDS: "${ADMIN_WS_POLL_LOGS_SECONDS:-5}"
      ADMIN_WS_LOGS_TAIL: "${ADMIN_WS_LOGS_TAIL:-1}"
    ports:
      - "127.0.0.1:8095:8095"
    volumes:
      - .:/app
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  analytics-ingester:
    build:
      context: ./services/analytics-aggregator
    restart: unless-stopped
    command: ["analytics-ingester"]
    env_file: .env
    environment:
      LISTEN_ADDR: ":8095"
      NATS_URL: "${NATS_URL:-nats://nats:4222}"
      NATS_STREAM: "AN_EVENTS"
      NATS_SUBJECT: "analytics.events.v1.>"
      NATS_DURABLE: "AGG_WRITER_V1"
      NATS_STATE_STREAM: "${NATS_STATE_STREAM:-STATE_EVENTS}"
      NATS_STATE_SUBJECT: "${NATS_STATE_SUBJECT:-state.events.v1.>}"
      NATS_STATE_DURABLE: "${NATS_STATE_DURABLE:-STATE_WRITER_V1}"
      CLICKHOUSE_DSN: "${CLICKHOUSE_DSN:-clickhouse://analytics:analytics@clickhouse:9000/default}"
      ANALYTICS_SCHEMA_PATH: "/app/contracts/analytics/event-envelope.v1.json"
      ANALYTICS_FLUSH_SECONDS: "${ANALYTICS_FLUSH_SECONDS:-60}"
      ANALYTICS_DEDUP_TTL_SECONDS: "${ANALYTICS_DEDUP_TTL_SECONDS:-900}"
      ANALYTICS_REHYDRATE_MINUTES: "${ANALYTICS_REHYDRATE_MINUTES:-180}"
      LIVE_ANALYTICS_WS_TOKEN: "${LIVE_ANALYTICS_WS_TOKEN:-dev-live-analytics-token}"
      INTERNAL_API_TOKEN: "${INTERNAL_API_TOKEN:-}"
      ADMIN_WS_API_BASE: "${ADMIN_WS_API_BASE:-http://api:8000}"
    volumes:
      - .:/app
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  scraper:
    build:
      context: ./services
    volumes:
      - ./services:/app
    restart: unless-stopped
    ports:
      - "127.0.0.1:9410:9410"
    env_file: .env
    environment:
      CORE_API_URL: http://api:8000/api/v1/internal/ingest-batch
    depends_on:
      api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nats:
        condition: service_started
      clickhouse:
        condition: service_started
      postgres:
        condition: service_healthy

  scheduler:
    build: .
    restart: unless-stopped
    command: python scripts/run_parsing_scheduler.py
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nats:
        condition: service_started
      clickhouse:
        condition: service_started
    environment:
      OTEL_TRACING_ENABLED: "${OTEL_TRACING_ENABLED:-true}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}"
      OTEL_SERVICE_NAME: "${OTEL_SCHEDULER_SERVICE_NAME:-gifty-scheduler}"

  admin-snapshotter:
    build: .
    restart: unless-stopped
    command: python scripts/run_admin_snapshotter.py
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nats:
        condition: service_started
      clickhouse:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"

  loki:
    image: grafana/loki:3.1.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./deploy/monitoring/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.1.1
    restart: unless-stopped
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./deploy/monitoring/tempo-config.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./deploy/monitoring/otel-collector-config.yml:/etc/otelcol/config.yml:ro
    depends_on:
      - tempo

  grafana:
    image: grafana/grafana-oss:11.4.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Serve behind nginx at https://<domain>/grafana/
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-api.giftyai.ru}
      # Do NOT use %(protocol)s here: Grafana will default to http and create a redirect loop behind nginx+TLS.
      GF_SERVER_ROOT_URL: "https://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - tempo

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m services.telegram_bot.app.main
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      API_BASE: "http://api:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: always

  pg-ch-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    working_dir: /app
    command: bash -lc "PYTHONPATH=/app python scripts/run_pg_ch_bootstrap.py"
    env_file: .env
    volumes:
      - .:/app
    environment:
      CLICKHOUSE_DSN: "${CLICKHOUSE_DSN:-clickhouse://analytics:analytics@clickhouse:9000/default}"
      NATS_URL: "${NATS_URL:-nats://nats:4222}"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  outbox-publisher:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: bash -lc "PYTHONPATH=/app python scripts/run_outbox_publisher.py"
    env_file: .env
    volumes:
      - .:/app
    environment:
      NATS_URL: "${NATS_URL:-nats://nats:4222}"
      OUTBOX_PUBLISH_INTERVAL_SECONDS: "${OUTBOX_PUBLISH_INTERVAL_SECONDS:-2}"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  prometheus_data:
  grafana_data:
  tempo_data:
  clickhouse_data:
